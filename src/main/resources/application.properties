spring.application.name=smartpharma-backend
server.port=8080
spring.jpa.properties.hibernate.default_schema=smartpharma
# Database Connection - ??? ??????? ????? Employees
spring.datasource.url=jdbc:postgresql://localhost:5432/employess
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway - ???? ??????
spring.flyway.enabled=false

# ==========================================
# ??????? JWT
# ==========================================

jwt.secret=ThisIsAVeryLongSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForSecurity
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ==========================================
# ??????? ????
# ==========================================

logging.level.com.smartpharma=DEBUG
logging.level.org.springframework.security=WARN