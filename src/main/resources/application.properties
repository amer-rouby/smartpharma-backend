spring.application.name=smartpharma-backend
server.port=8080
spring.jpa.properties.hibernate.default_schema=smartpharma
spring.datasource.url=jdbc:postgresql://localhost:5432/employess
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=false
jwt.secret=ThisIsAVeryLongSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForSecurity
jwt.expiration=86400000
jwt.refresh-expiration=604800000

logging.level.com.smartpharma=DEBUG
logging.level.org.springframework.security=WARN
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload-dir=${user.dir}/uploads/profiles/
